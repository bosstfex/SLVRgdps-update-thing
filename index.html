<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
	<title>Web Dashers+</title>
	<link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
	<link rel="stylesheet" href="assets/style.css">

	<!-- - Embeds - -->
	<!-- Open Graph -->
    <meta property="og:title" content="Web Dash"/>
    <meta property="og:description" content="A mod of geometrydash.com!"/>
    <meta property="og:image" content="https://web-dashers.github.io/assets/logo.png"/>
    <meta property="og:url" content="https://web-dashers.github.io/"/>
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image"/>
    <meta name="twitter:title" content="Web Dash"/>
    <meta name="twitter:description" content="A mod of geometrydash.com!"/>
    <meta name="twitter:image" content="https://web-dashers.github.io/assets/logo.png"/>
	
	<!-- Menu System Styles -->
	<link rel="stylesheet" href="assets/scripts/menu-system.css">

	<!-- Libraries and stuff -->
	<script type="module" src="assets/scripts/allObjects.js"></script>
	<script src="assets/scripts/allLevels.js"></script>
	<script src="assets/scripts/phaser.min.js"></script>
	<script src="assets/scripts/pako.min.js"></script>
	<script src="assets/scripts/cache-manager.js"></script>
	<script src="assets/scripts/GDapiWrapper.js"></script>
	<!-- - -->
	<!-- worker -->
	<script>window._gdProxyUrl = "https://gd-proxy.gmdc.workers.dev";</script>
	<!-- ACTUAL GAME CODE -->
	<script type="module" crossorigin src="assets/scripts/index-game.js"></script>
	<!-- Menu System Script -->
	<script src="assets/scripts/menu-system.js"></script>
	<!-- - -->
	<script>
		new ResizeObserver(() => {
			window.dispatchEvent(new Event('resize'));
		}).observe(document.documentElement);
    
    document.oncontextmenu = (event) => {
      event.preventDefault();
    };
	</script>
</head>

<body>
	<!-- Menu system will be injected here -->
	<div id="menu-container-placeholder"></div>

	<script>
		// Load menu system HTML
		fetch('assets/scripts/menu-system.html')
			.then(response => response.text())
			.then(html => {
				document.getElementById('menu-container-placeholder').innerHTML = html;
			})
			.catch(err => console.error('Failed to load menu system:', err));
	</script>
</body>

</html>
